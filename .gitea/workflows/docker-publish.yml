# Build + publish the media-box container image to the Gitea container registry.
#
# Publishes linux/amd64 (Unraid's arch) so the image runs natively there — a bare
# `docker build` on an Apple-Silicon Mac produces an arm64 image that fails on
# amd64 Unraid with "exec format error". better-sqlite3 + sharp compile per-arch,
# so building for the target arch is what makes them load correctly.
#
# Requires a repo secret REGISTRY_TOKEN: a Gitea access token (or the package
# owner's password) with package:write scope. The image is pushed to
# git.ncatechsolutions.org/nickanton/media-box.
name: docker-publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: git.ncatechsolutions.org
          username: ${{ gitea.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: git.ncatechsolutions.org/nickanton/media-box
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
